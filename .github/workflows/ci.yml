name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/HookSentry.Cloud.Host/HookSentry.Cloud.Host.csproj

      - name: Build
        run: dotnet build src/HookSentry.Cloud.Host/HookSentry.Cloud.Host.csproj --no-restore -c Release
