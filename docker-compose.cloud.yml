services:
  api:
    build:
      context: .
      dockerfile: src/HookSentry.Cloud.Host/Dockerfile
    image: ghcr.io/rhaynerrs/hooksentry-cloud-api:${API_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5143:5143"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-Your_database};Username=${POSTGRES_USER:-Your_username};Password=${POSTGRES_PASSWORD:-Your_password123}
      - ConnectionStrings__Redis=redis:6379,user=default,password=${REDIS_PASSWORD:-Your_redis_password},abortConnect=false
      - Jwt__Key=${JWT_KEY:-Q29ubmVjdGlvblN0cmluZ3NfX0RlZmF1bHRDb25uZWN0aW9uPUhvc3Q9cG9zdGdyZXM7UG9ydD01NDMyO0RhdGFiYXNlPVlvdXJfZGF0YWJhc2U7VXNlcm5hbWU9WW91cl91c2VybmFtZTtQYXNzd29yZD1Zb3VyX3Bhc3N3b3JkMTIz}
      - ApiKey__Value=${API_KEY:-change-this-api-key}
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_USER:-Your_username}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-Your_password123}
      - CredentialEncryption__Key=${CREDENTIAL_ENCRYPTION_KEY:-YTNmOGMyZDFlNGI3MDkxZjZhNWQzZTJjOGYxYjRhNzA=}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      - Otel__Endpoint=http://tempo:4317
      - Otel__LogsEndpoint=http://tempo:4318
      - Otel__ServiceName=hooksentry-cloud-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "service_name=hooksentry-cloud-api"

  worker:
    build:
      context: ./hooksentry
      dockerfile: src/HookSentry.Worker/dockerfile
    image: ghcr.io/rhaynerrs/hooksentry-cloud-worker:${WORKER_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-Your_database};Username=${POSTGRES_USER:-Your_username};Password=${POSTGRES_PASSWORD:-Your_password123}
      - ConnectionStrings__Redis=redis:6379,user=default,password=${REDIS_PASSWORD:-Your_redis_password},abortConnect=false
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=${RABBITMQ_USER:-Your_username}
      - RabbitMq__Password=${RABBITMQ_PASSWORD:-Your_password123}
      - CredentialEncryption__Key=${CREDENTIAL_ENCRYPTION_KEY:-YTNmOGMyZDFlNGI3MDkxZjZhNWQzZTJjOGYxYjRhNzA=}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-Your_username}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-Your_password123}"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-Your_password123}"
      POSTGRES_USER: "${POSTGRES_USER:-Your_username}"
      POSTGRES_DB: "${POSTGRES_DB:-Your_database}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-Your_username} -d ${POSTGRES_DB:-Your_database}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-Your_redis_password}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Your_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ../docker/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro

  tempo:
    image: grafana/tempo:latest
    command: -config.file=/etc/tempo/tempo-config.yaml
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../docker/tempo/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - tempo

volumes:
  grafana_data:
