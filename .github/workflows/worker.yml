name: Worker — test, build & deploy

on:
  push:
    branches: [main]
    paths:
      - 'hooksentry'                       # submódulo core (onde vive o Worker)
      - 'docker-compose.cloud.yml'
      - '.github/workflows/worker.yml'
  workflow_dispatch:

concurrency:
  group: worker-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/rhaynerrs/hooksentry-cloud-worker

jobs:
  test:
    name: Testes (core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore hooksentry/src/HookSentry.Tests/HookSentry.Tests.csproj

      - name: Test
        run: dotnet test hooksentry/src/HookSentry.Tests/HookSentry.Tests.csproj -c Release --no-restore

  build-and-push:
    name: Build & push da imagem (GHCR)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: hooksentry
          file: hooksentry/src/HookSentry.Worker/dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS (SSH)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copiar compose pra VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.cloud.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull da imagem nova + recriar container
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: DEPLOY_PATH,GHCR_USER,GHCR_TOKEN,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,REDIS_PASSWORD,RABBITMQ_USER,RABBITMQ_PASSWORD,JWT_KEY,API_KEY,CREDENTIAL_ENCRYPTION_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # Reescreve o .env completo (mesmo conjunto compartilhado api/worker)
            umask 077
            {
              echo "POSTGRES_USER=$POSTGRES_USER"
              echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
              echo "POSTGRES_DB=$POSTGRES_DB"
              echo "REDIS_PASSWORD=$REDIS_PASSWORD"
              echo "RABBITMQ_USER=$RABBITMQ_USER"
              echo "RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD"
              echo "JWT_KEY=$JWT_KEY"
              echo "API_KEY=$API_KEY"
              echo "CREDENTIAL_ENCRYPTION_KEY=$CREDENTIAL_ENCRYPTION_KEY"
              echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
              echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET"
            } > .env

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker compose -p hooksentry-cloud -f docker-compose.cloud.yml pull worker
            docker compose -p hooksentry-cloud -f docker-compose.cloud.yml up -d --no-deps worker
            docker image prune -f
            docker logout ghcr.io
