name: API — test, build & deploy

on:
  push:
    tags: ['v*']                           # criar tag v* dispara build+deploy
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag pra buildar e deployar (deve existir, ex: v1.2.3)'
        required: true
        type: string

concurrency:
  group: api-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/rhaynerrs/hooksentry-cloud-api
  TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          submodules: recursive            # precisa do core (hooksentry/) pra compilar
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/HookSentry.Billing.Tests/HookSentry.Billing.Tests.csproj

      - name: Test
        run: dotnet test src/HookSentry.Billing.Tests/HookSentry.Billing.Tests.csproj -c Release --no-restore

  build-and-push:
    name: Build & push da imagem (GHCR)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN || github.token }}

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/HookSentry.Cloud.Host/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy na VPS (self-hosted)
    needs: build-and-push
    runs-on: self-hosted
    env:
      GHCR_USER: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
      RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      API_KEY: ${{ secrets.API_KEY }}
      CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      API_IMAGE_TAG: ${{ env.TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Gerar .env
        run: |
          umask 077
          {
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "POSTGRES_DB=$POSTGRES_DB"
            echo "REDIS_PASSWORD=$REDIS_PASSWORD"
            echo "RABBITMQ_USER=$RABBITMQ_USER"
            echo "RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD"
            echo "JWT_KEY=$JWT_KEY"
            echo "API_KEY=$API_KEY"
            echo "CREDENTIAL_ENCRYPTION_KEY=$CREDENTIAL_ENCRYPTION_KEY"
            echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
            echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET"
          } > .env

      - name: Pull & recriar container
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          docker compose -p hooksentry-cloud -f docker-compose.cloud.yml pull api
          docker compose -p hooksentry-cloud -f docker-compose.cloud.yml up -d --no-deps api
          docker image prune -f
          docker logout ghcr.io
